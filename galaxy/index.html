<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Trek Online Community Galaxy Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lekton:ital,wght@0,400;0,700;1,400&family=Orbitron:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <div id="loading">
    <div id="loading-text">Initializing Star Chart</div>
    <div class="loading-bar"></div>
  </div>

  <div id="map-container">
    <canvas id="canvas"></canvas>
    <svg id="svg-overlay"></svg>
  </div>

  <div id="hud">
    <div id="title">United Federation of Planets: Explored Regions</div>
  </div>

  <div id="legend">
  <div class="legend-item">
    <svg width="16" height="16" viewBox="-8 -8 16 16">
      <polygon points="0,-6 6,0 0,6 -6,0" fill="var(--system-dot)"/>
    </svg>
    Star System
  </div>
  <div class="legend-item">
    <svg width="16" height="16" viewBox="-8 -8 16 16">
      <polygon points="0,6 -6,-6 6,-6" fill="var(--system-dot)"/>
    </svg>
    Facility
  </div>
  <div class="legend-item">
    <svg width="16" height="16" viewBox="-8 -8 16 16">
      <rect x="-5" y="-5" width="10" height="10" fill="var(--system-dot)"/>
    </svg>
    Point of Interest
  </div>
</div>

  <div id="zoom-controls">
    <button class="zoom-btn" id="btn-zoom-in">+</button>
    <button class="zoom-btn" id="btn-zoom-out">−</button>
    <button class="zoom-btn" id="btn-zoom-fit" title="Fit to screen">FIT</button>
  </div>

  <div id="info-panel">
    <div id="info-panel-header">
      <div id="info-panel-title">—</div>
      <button id="info-panel-close">✕</button>
    </div>
    <div id="info-panel-body"></div>
  </div>

</div>
<script src="starmap.js"></script>
</body>
</html>
